version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gocritic
    - misspell
    - errorlint
    - bodyclose
    - sqlclosecheck
    - contextcheck
    - durationcheck
    - noctx
    - unconvert
    - wastedassign

  exclusions:
    paths:
      - clients
      - docs

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
    errorlint:
      errorf: true
      asserts: true
      comparison: true
