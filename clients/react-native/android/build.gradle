buildscript {
  ext.SynchroReactNative = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return SynchroReactNative[prop]
  }

  repositories {
    google()
    mavenCentral()
    mavenLocal()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def defaultSynchroVersion = "0.2.0"
def resolvedSynchroVersion = findProperty("synchroVersion")?.toString() ?: defaultSynchroVersion

android {
  namespace "com.trainstar.synchro.rn"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  sourceSets {
    main {
      kotlin.srcDirs = ['src/main/kotlin']
    }
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

repositories {
  mavenLocal()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "fit.trainstar:synchro:${resolvedSynchroVersion}"
  implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0"
}
