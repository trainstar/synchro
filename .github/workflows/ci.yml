name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*.*.*'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  linux-pgrx-runtime:
    runs-on: ubuntu-24.04
    steps:
      - uses: dtolnay/rust-toolchain@stable

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: |
          if [ -f "$HOME/.pgrx/config.toml" ] && grep -q '^pg18' "$HOME/.pgrx/config.toml"; then
            echo "Using cached PG18 pgrx runtime"
          else
            cargo pgrx init --pg18 download
          fi

      - name: Archive PG18 pgrx runtime
        run: tar -C "$HOME" -cf "$RUNNER_TEMP/pgrx-pg18-linux.tar" .pgrx

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: pgrx-pg18-linux
          path: ${{ runner.temp }}/pgrx-pg18-linux.tar
          compression-level: 0

  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/cache@v5.0.4
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Run Go lint checks
        run: make lint-go

      - name: Run Rust lint checks
        run: make lint-rust-core

      - name: Run React Native lint checks
        run: make lint-rn

      - name: Run React Native unit tests
        run: make test-rn-unit

  docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Build docs site
        run: make docs-build

  server:
    runs-on: ubuntu-24.04
    needs: linux-pgrx-runtime
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - uses: actions/download-artifact@v8.0.1
        with:
          name: pgrx-pg18-linux
          path: ${{ runner.temp }}/pgrx-pg18-linux

      - name: Restore PostgreSQL 18 pgrx runtime
        run: tar -C "$HOME" -xf "$RUNNER_TEMP/pgrx-pg18-linux/pgrx-pg18-linux.tar"

      - name: Verify PostgreSQL 18 for pgrx
        run: |
          test -f "$HOME/.pgrx/config.toml"
          grep -q '^pg18' "$HOME/.pgrx/config.toml"

      - name: Run shared core tests
        run: make test-rust-core

      - name: Run PostgreSQL extension lint checks
        run: make lint-rust-pg

      - name: Run PostgreSQL extension tests
        run: make test-rust-pg

      - name: Run adapter integration tests
        run: make test-adapter

  swift-sdk:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install PostgreSQL 18 and extension build dependencies on macOS
        run: |
          for formula in postgresql@18 pkgconf openssl@3 libxml2 libxslt; do
            brew list --versions "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: |
          if [ -f "$HOME/.pgrx/config.toml" ] && grep -q '^pg18' "$HOME/.pgrx/config.toml"; then
            echo "Using cached PG18 pgrx runtime"
          else
            cargo pgrx init --pg18 "$(brew --prefix postgresql@18)/bin/pg_config"
          fi

      - name: Run Swift integration tests
        run: make test-swift

  rn-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/cache@v5.0.4
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            clients/react-native/example/ios/Pods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('clients/react-native/example/ios/Podfile.lock', 'Synchro.podspec', 'clients/react-native/SynchroReactNative.podspec') }}

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install PostgreSQL 18 and extension build dependencies on macOS
        run: |
          for formula in postgresql@18 pkgconf openssl@3 libxml2 libxslt; do
            brew list --versions "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: |
          if [ -f "$HOME/.pgrx/config.toml" ] && grep -q '^pg18' "$HOME/.pgrx/config.toml"; then
            echo "Using cached PG18 pgrx runtime"
          else
            cargo pgrx init --pg18 "$(brew --prefix postgresql@18)/bin/pg_config"
          fi

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Ensure CocoaPods is available
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Ensure Detox iOS utilities are available
        run: |
          if ! command -v applesimutils >/dev/null 2>&1; then
            brew tap wix/brew
            brew install applesimutils
          fi

      - name: Reset Watchman state
        run: |
          if command -v watchman >/dev/null 2>&1; then
            watchman watch-del "$GITHUB_WORKSPACE/clients/react-native" || true
            watchman watch-project "$GITHUB_WORKSPACE/clients/react-native"
          fi

      - name: Run React Native iOS Detox tests
        run: make test-rn-e2e-ios

  kotlin-sdk:
    runs-on: ubuntu-24.04
    needs: linux-pgrx-runtime
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - uses: actions/download-artifact@v8.0.1
        with:
          name: pgrx-pg18-linux
          path: ${{ runner.temp }}/pgrx-pg18-linux

      - name: Restore PostgreSQL 18 pgrx runtime
        run: tar -C "$HOME" -xf "$RUNNER_TEMP/pgrx-pg18-linux/pgrx-pg18-linux.tar"

      - name: Verify PostgreSQL 18 for pgrx
        run: |
          test -f "$HOME/.pgrx/config.toml"
          grep -q '^pg18' "$HOME/.pgrx/config.toml"

      - name: Verify Android SDK tooling
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          test -x "$SDKMANAGER"
          "$SDKMANAGER" --version

      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          yes | "$SDKMANAGER" --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Run Kotlin integration tests
        run: make test-kotlin

  rn-android:
    runs-on: ubuntu-24.04
    needs: linux-pgrx-runtime
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/cache@v5.0.4
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - uses: actions/download-artifact@v8.0.1
        with:
          name: pgrx-pg18-linux
          path: ${{ runner.temp }}/pgrx-pg18-linux

      - name: Restore PostgreSQL 18 pgrx runtime
        run: tar -C "$HOME" -xf "$RUNNER_TEMP/pgrx-pg18-linux/pgrx-pg18-linux.tar"

      - name: Verify PostgreSQL 18 for pgrx
        run: |
          test -f "$HOME/.pgrx/config.toml"
          grep -q '^pg18' "$HOME/.pgrx/config.toml"

      - name: Verify Android SDK tooling
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          test -x "$SDKMANAGER"
          "$SDKMANAGER" --version

      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          yes | "$SDKMANAGER" --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Cache Android AVD
        id: rn-android-avd-cache
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: rn-android-avd-${{ runner.os }}-api34-google-apis-x86_64-pixel_7

      - name: Generate Android AVD snapshot
        if: steps.rn-android-avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          avd-name: Pixel_7_API_34
          profile: pixel_7
          target: google_apis
          force-avd-creation: false
          disable-linux-hw-accel: false
          disable-animations: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "Generated Android AVD snapshot"

      - name: Run React Native Android Detox tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          avd-name: Pixel_7_API_34
          profile: pixel_7
          target: google_apis
          force-avd-creation: false
          disable-linux-hw-accel: false
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: make test-rn-e2e-android
