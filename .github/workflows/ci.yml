name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*.*.*'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: clients/react-native/yarn.lock

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Run Go lint checks
        run: make lint-go

      - name: Run Rust lint checks
        run: make lint-rust

      - name: Run React Native lint checks
        run: make lint-rn

      - name: Run React Native unit tests
        run: make test-rn-unit

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Build docs site
        run: make docs-build

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - name: Run shared core tests
        run: make test-rust-core

      - name: Run PostgreSQL extension tests
        run: make test-rust-pg

      - name: Run adapter integration tests
        run: make test-adapter

  swift-sdk:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - name: Run Swift integration tests
        run: make test-swift

  rn-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: clients/react-native/yarn.lock

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            clients/react-native/example/ios/Pods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('clients/react-native/example/ios/Podfile.lock', 'Synchro.podspec', 'clients/react-native/SynchroReactNative.podspec') }}

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Ensure CocoaPods is available
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Run React Native iOS Detox tests
        run: make test-rn-e2e-ios

  kotlin-sdk:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Run Kotlin integration tests
        run: make test-kotlin

  rn-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: clients/react-native/yarn.lock

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Run React Native Android Detox tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: make test-rn-e2e-android
