name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*.*.*'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/cache@v5.0.4
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Run Go lint checks
        run: make lint-go

      - name: Run Rust lint checks
        run: make lint-rust-core

      - name: Run React Native lint checks
        run: make lint-rn

      - name: Run React Native unit tests
        run: make test-rn-unit

  docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Build docs site
        run: make docs-build

  server:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - name: Run shared core tests
        run: make test-rust-core

      - name: Run PostgreSQL extension lint checks
        run: make lint-rust-pg

      - name: Run PostgreSQL extension tests
        run: make test-rust-pg

      - name: Run adapter integration tests
        run: make test-adapter

  swift-sdk:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install PostgreSQL 18 and extension build dependencies on macOS
        run: |
          for formula in postgresql@18 pkgconf openssl@3 libxml2 libxslt; do
            brew list --versions "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 "$(brew --prefix postgresql@18)/bin/pg_config"

      - name: Run Swift integration tests
        run: make test-swift

  rn-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/cache@v5.0.4
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            clients/react-native/example/ios/Pods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('clients/react-native/example/ios/Podfile.lock', 'Synchro.podspec', 'clients/react-native/SynchroReactNative.podspec') }}

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install PostgreSQL 18 and extension build dependencies on macOS
        run: |
          for formula in postgresql@18 pkgconf openssl@3 libxml2 libxslt; do
            brew list --versions "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 "$(brew --prefix postgresql@18)/bin/pg_config"

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Ensure CocoaPods is available
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Reset Watchman state
        run: |
          if command -v watchman >/dev/null 2>&1; then
            watchman watch-del "$GITHUB_WORKSPACE/clients/react-native" || true
            watchman watch-project "$GITHUB_WORKSPACE/clients/react-native"
          fi

      - name: Run React Native iOS Detox tests
        run: make test-rn-e2e-ios

  kotlin-sdk:
    runs-on: ubuntu-24.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Run Kotlin integration tests
        run: make test-kotlin

  rn-android:
    runs-on: ubuntu-24.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/cache@v5.0.4
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v5.0.4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-pgrx-${{ runner.os }}-0.17.0

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || [ "$(cargo pgrx --version | awk '{print $2}')" != "0.17.0" ]; then
            cargo install --locked cargo-pgrx --version 0.17.0
          fi

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Run React Native Android Detox tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: make test-rn-e2e-android
