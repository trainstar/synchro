name: CodeQL

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read

jobs:
  analyze-go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Build Go adapter
        working-directory: api/go
        run: GOWORK=off go build ./...

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:go

  analyze-javascript:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/cache@v5.0.5
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  analyze-swift:
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build Swift package
        run: swift build

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:swift

  analyze-kotlin:
    runs-on: ubuntu-24.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Verify Android SDK tooling
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          test -x "$SDKMANAGER"
          "$SDKMANAGER" --version

      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          yes | "$SDKMANAGER" --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Build Kotlin package
        working-directory: clients/kotlin
        run: ./gradlew :synchro:compileDebugKotlin

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
