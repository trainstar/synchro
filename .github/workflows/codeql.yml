name: CodeQL

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read

jobs:
  analyze-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Build Go adapter
        working-directory: api/go
        run: GOWORK=off go build ./...

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:go

  analyze-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: |
            clients/react-native/node_modules
            clients/react-native/example/node_modules
            clients/react-native/.yarn/install-state.gz
          key: rn-deps-${{ runner.os }}-${{ hashFiles('clients/react-native/yarn.lock', 'clients/react-native/package.json', 'clients/react-native/example/package.json') }}
          restore-keys: |
            rn-deps-${{ runner.os }}-

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  analyze-swift:
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build Swift package
        run: swift build

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:swift

  analyze-kotlin:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Build Kotlin package
        working-directory: clients/kotlin
        run: ./gradlew :synchro:compileDebugKotlin

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
