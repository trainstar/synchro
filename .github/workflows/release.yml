name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  VERSION: ${{ github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: clients/react-native/yarn.lock

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Run Go lint checks
        run: make lint-go

      - name: Run Rust lint checks
        run: make lint-rust

      - name: Run React Native lint checks
        run: make lint-rn

      - name: Run React Native unit tests
        run: make test-rn-unit

  validate-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install PostgreSQL 18 and extension build dependencies on macOS
        run: brew install postgresql@18 pkg-config openssl@3 libxml2 libxslt

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 "$(brew --prefix postgresql@18)/bin/pg_config"

      - name: Validate Rust core
        run: make test-rust-core

      - name: Validate PostgreSQL extension
        run: make test-rust-pg

      - name: Validate Go adapter
        run: make test-adapter

  validate-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install PostgreSQL 18 and extension build dependencies on macOS
        if: runner.os == 'macOS'
        run: brew install postgresql@18 pkg-config openssl@3 libxml2 libxslt

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            cargo pgrx init --pg18 "$(brew --prefix postgresql@18)/bin/pg_config"
          else
            cargo pgrx init --pg18 download
          fi

      - name: Validate Swift SDK
        run: make test-swift

  validate-rn-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: clients/react-native/yarn.lock

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            clients/react-native/example/ios/Pods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('clients/react-native/example/ios/Podfile.lock', 'Synchro.podspec', 'clients/react-native/SynchroReactNative.podspec') }}

      - name: Install PostgreSQL 18 and extension build dependencies on macOS
        run: brew install postgresql@18 pkg-config openssl@3 libxml2 libxslt

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 "$(brew --prefix postgresql@18)/bin/pg_config"

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Ensure CocoaPods is available
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Validate React Native iOS bridge
        run: make test-rn-e2e-ios

  validate-kotlin:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Validate Kotlin SDK
        run: make test-kotlin

  validate-rn-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      GRADLE_TEST_ARGS: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod
          cache-dependency-path: api/go/go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: clients/react-native/yarn.lock

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Set Android Java home
        run: echo "ANDROID_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Install React Native dependencies
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable

      - name: Validate React Native Android bridge
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: make test-rn-e2e-android

  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Validate docs build
        run: make docs-build

  release-gates:
    runs-on: ubuntu-latest
    outputs:
      publish_kotlin: ${{ steps.gates.outputs.publish_kotlin }}
      publish_npm: ${{ steps.gates.outputs.publish_npm }}
    steps:
      - id: gates
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$MAVEN_CENTRAL_USERNAME" ] && [ -n "$MAVEN_CENTRAL_PASSWORD" ] && [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "publish_kotlin=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_kotlin=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$NPM_TOKEN" ]; then
            echo "publish_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_npm=false" >> "$GITHUB_OUTPUT"
          fi

  build-adapter-binaries:
    needs:
      - validate-quality
      - validate-server
      - validate-swift
      - validate-rn-ios
      - validate-kotlin
      - validate-rn-android
      - validate-docs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go/go.mod

      - name: Build synchrod-pg binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          cd api/go
          GOWORK=off go build -ldflags="-s -w" -o "../../dist/synchrod-pg-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/synchrod-pg

      - uses: actions/upload-artifact@v4
        with:
          name: synchrod-pg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/synchrod-pg-${{ matrix.goos }}-${{ matrix.goarch }}

  package-extension:
    needs: validate-server
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            extensions -> target

      - name: Install PostgreSQL extension build dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            libclang-dev \
            libreadline-dev \
            libssl-dev \
            libxml2-dev \
            libxml2-utils \
            libxslt-dev \
            pkg-config \
            xsltproc \
            zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-${{ runner.os }}-0.17.0-pg18

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize PostgreSQL 18 for pgrx
        run: cargo pgrx init --pg18 download

      - name: Package PG 18 extension
        run: |
          mkdir -p dist
          cd extensions/synchro-pg
          PG_CONFIG_PATH="$(awk -F'\"' '/^pg18[[:space:]]*=/ { print $2 }' "$HOME/.pgrx/config.toml")"
          CARGO_TARGET_DIR="${GITHUB_WORKSPACE}/.pgrx-target" cargo pgrx package --pg-config "$PG_CONFIG_PATH" --out-dir "${GITHUB_WORKSPACE}/dist/synchro-pg-pg18"
          cd "${GITHUB_WORKSPACE}/dist"
          tar -czf "synchro-pg-pg18-${{ runner.os }}-${{ runner.arch }}.tar.gz" synchro-pg-pg18

      - uses: actions/upload-artifact@v4
        with:
          name: synchro-pg-pg18-${{ runner.os }}-${{ runner.arch }}
          path: dist/synchro-pg-pg18-${{ runner.os }}-${{ runner.arch }}.tar.gz

  publish-kotlin:
    needs: [validate-kotlin, release-gates]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.release-gates.outputs.publish_kotlin == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Publish Kotlin package
        working-directory: clients/kotlin
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishAndReleaseToMavenCentral -Pversion="${VERSION#v}"

  publish-npm:
    needs: [validate-rn-ios, validate-rn-android, release-gates]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.release-gates.outputs.publish_npm == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: yarn
          cache-dependency-path: clients/react-native/yarn.lock

      - name: Install and build React Native package
        working-directory: clients/react-native
        run: |
          corepack enable
          yarn install --immutable
          yarn prepare

      - name: Publish React Native package
        working-directory: clients/react-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm version "${VERSION#v}" --no-git-tag-version
          npm publish --access public --provenance

  create-release:
    needs: [build-adapter-binaries, package-extension]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -type f -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            SHA256SUMS.txt
